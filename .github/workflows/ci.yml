name: CI

on:
  push:
    branches: ["master", "main", "feature/*", "fix/*"]
  pull_request:
    branches: ["master", "main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - run: uv run ruff check xic_extractor tests
      - name: Diagnostics index in sync
        run: uv run python scripts/check_diagnostics_index.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - run: uv run mypy xic_extractor

  test:
    name: test / Test (Python ${{ matrix.python-version }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo-${{ matrix.python-version }}
          submodules: false
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          working-directory: repo-${{ matrix.python-version }}
      - name: Install
        shell: pwsh
        working-directory: repo-${{ matrix.python-version }}
        run: |
          uv venv --python ${{ matrix.python-version }} --clear
          uv pip install -e .[dev]
      - name: Test
        shell: pwsh
        working-directory: repo-${{ matrix.python-version }}
        run: uv run pytest -v --tb=short -x
