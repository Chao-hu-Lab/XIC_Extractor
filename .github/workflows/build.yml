name: Build Windows EXE

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.12

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install PyQt6 openpyxl pyinstaller pillow

      - name: Build executable
        run: uv run pyinstaller xic_extractor.spec

      - name: Prepare distribution folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\XIC_Extractor\output -Force
          attrib +h dist\XIC_Extractor\_internal

      - name: Package distribution
        shell: pwsh
        run: |
          Compress-Archive -Path dist\XIC_Extractor -DestinationPath XIC_Extractor_${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: XIC_Extractor_${{ github.ref_name }}.zip
          generate_release_notes: true
