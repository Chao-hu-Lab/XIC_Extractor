name: Productization Goal
description: Define a bounded productization goal with authority and validation rules.
title: "[Productization] "
labels:
  - needs-triage
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: State the one productization outcome this issue should close.
    validations:
      required: true
  - type: dropdown
    id: lane
    attributes:
      label: Lane
      options:
        - shared
        - targeted
        - untargeted
        - workflow-only
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and stop rules
      description: Include any forbidden output changes, GUI limits, RAW run limits, or product decisions needed.
    validations:
      required: true
  - type: textarea
    id: authority
    attributes:
      label: Authority and public surface
      description: Name whether this can affect ProductWriter, matrix/workbook, selected peak/area, counted detection, CLI/config, schemas, or docs only.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Name the focused tests, real-data evidence, expected-diff gate, or manual review needed to close the goal.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Done when
      description: State the exact closure condition and required handoff/control-plane update.
    validations:
      required: true
