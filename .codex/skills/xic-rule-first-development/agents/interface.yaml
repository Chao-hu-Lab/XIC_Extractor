interface:
  display_name: "XIC Rule-First Development"
  short_description: "Use examples to freeze a rule, apply it to the full relevant scope, and avoid endless slices or ad hoc patches."
  default_prompt: "Use $xic-rule-first-development when major XIC work should move from representative examples to a frozen rule, full-scope classification/application, ambiguous-only review, and one bounded delivery."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "powershell"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "neutral-source-plus-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
