interface:
  display_name: "XIC PR Stack Repair"
  short_description: "Repair stacked XIC PR boundaries before patching CI"
  default_prompt: "Use $xic-pr-stack-repair before repairing or splitting stacked XIC PRs: map base/head branches, repeated ledger/artifact files, clean-checkout CI dependencies, stale stack commits, and rebuild boundaries before code fixes."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "powershell"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "neutral-source-plus-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
