interface:
  display_name: "XIC Large PR Review"
  short_description: "Read-only blast-radius review for high-risk XIC PRs"
  default_prompt: "Use $xic-large-pr-review for read-only review of large or diagnostics-heavy XIC PRs, leading with findings and strongest evidence reviewed."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "powershell"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "neutral-source-plus-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
