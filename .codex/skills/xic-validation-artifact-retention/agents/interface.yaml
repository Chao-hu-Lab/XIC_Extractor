interface:
  display_name: "XIC Validation Artifact Retention"
  short_description: "Decide tracked versus externalized XIC validation artifacts"
  default_prompt: "Use $xic-validation-artifact-retention when XIC validation, Gallery, TSV, PNG, workbook, trace JSON, or diagnostic outputs need a version-control and inventory boundary."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "powershell"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "neutral-source-plus-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
