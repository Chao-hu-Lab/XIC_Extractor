interface:
  display_name: "XIC RAW Validation"
  short_description: "Preflight and accept expensive RAW-backed XIC validation"
  default_prompt: "Use $xic-raw-validation before launching or accepting XIC RAW-backed validation, especially 8RAW/85RAW, heartbeat/timing, benchmark, or production-equivalent gates."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "powershell"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "neutral-source-plus-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
