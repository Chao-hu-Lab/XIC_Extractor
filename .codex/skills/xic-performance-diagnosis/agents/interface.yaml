interface:
  display_name: "XIC Performance Diagnosis"
  short_description: "Rank XIC runtime bottlenecks from artifacts before optimization"
  default_prompt: "Use $xic-performance-diagnosis for XIC preset/runtime optimization: inspect timing artifacts, rank bottlenecks, classify call cost and workload, choose exact-safe/expected-diff/fast-mode lane, and define correctness gates before code edits."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "powershell"
  trust:
    source_tier: "repo-local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "neutral-source-plus-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
