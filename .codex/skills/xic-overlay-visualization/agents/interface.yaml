interface:
  display_name: "XIC Overlay Visualization"
  short_description: "Specify and verify interpretable XIC/LC-MS overlay figures"
  default_prompt: "Use $xic-overlay-visualization when designing, generating, reviewing, or fixing XIC/LC-MS overlay plots, chromatogram overlays, smoothing visuals, or source-successor differential figures."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "powershell"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "neutral-source-plus-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
