interface:
  display_name: "XIC Architecture Preflight"
  short_description: "Require owner, product-rule, call-cost, contract, and validation gates before XIC feature work"
  default_prompt: "Use $xic-architecture-preflight before non-trivial XIC implementation so owner reuse, evidence role, call cost, public contract risk, validation gate, and stop rule are explicit."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "powershell"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "neutral-source-plus-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
